name: Validate Airflow DAGs

on:
  push:
    branches: [ main ]
    paths:
      - 'dags/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Airflow + DAG dependencies
        run: |
          AIRFLOW_VERSION=3.1.1
          PYTHON_VERSION=3.11
          CONSTRAINT_URL="https://raw.githubusercontent.com/apache/airflow/constraints-${AIRFLOW_VERSION}/constraints-${PYTHON_VERSION}.txt"
          pip install "apache-airflow==${AIRFLOW_VERSION}" --constraint "${CONSTRAINT_URL}"
          pip install pandas

      - name: Validate DAGs
        run: |
          echo "Validating DAG syntax..."
          export AIRFLOW_HOME="${RUNNER_TEMP}/airflow"
          export AIRFLOW__CORE__DAGS_FOLDER="${GITHUB_WORKSPACE}/dags"
          export AIRFLOW__CORE__LOAD_EXAMPLES=False
          mkdir -p "${AIRFLOW_HOME}"
          echo "GITHUB_WORKSPACE=${GITHUB_WORKSPACE}"
          echo "AIRFLOW_HOME=${AIRFLOW_HOME}"
          echo "AIRFLOW__CORE__DAGS_FOLDER=${AIRFLOW__CORE__DAGS_FOLDER}"
          ls -la "${GITHUB_WORKSPACE}/dags"
          airflow db migrate
          airflow config get-value core dags_folder
          airflow dags list --subdir "${GITHUB_WORKSPACE}/dags"
          airflow dags list-import-errors --subdir "${GITHUB_WORKSPACE}/dags"
